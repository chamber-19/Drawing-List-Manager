<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
    <linearGradient id="pencil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="2">
    <path d="M16 128 H496"/>
    <path d="M16 224 H496"/>
    <path d="M16 320 H496"/>
    <path d="M16 416 H496"/>
    <path d="M128 16 V496"/>
    <path d="M224 16 V496"/>
    <path d="M320 16 V496"/>
    <path d="M416 16 V496"/>
  </g>

  <!-- Back paper -->
  <g filter="url(#shadow)">
    <rect x="118" y="108" width="260" height="320" rx="20" ry="20" fill="#c7d2fe" transform="rotate(-8 248 268)"/>
  </g>

  <!-- Front drawing sheet -->
  <g filter="url(#shadow)">
    <rect x="132" y="120" width="260" height="320" rx="20" ry="20" fill="url(#paper)"/>
    <!-- Title bar -->
    <rect x="132" y="120" width="260" height="46" rx="20" ry="20" fill="#1f2937"/>
    <rect x="132" y="146" width="260" height="20" fill="#1f2937"/>
    <circle cx="156" cy="143" r="6" fill="#ef4444"/>
    <circle cx="178" cy="143" r="6" fill="#f59e0b"/>
    <circle cx="200" cy="143" r="6" fill="#10b981"/>

    <!-- Blueprint-style drawing: house -->
    <g stroke="#4f46e5" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M180 300 L180 230 L262 190 L344 230 L344 300 Z"/>
      <path d="M180 230 L262 190 L344 230"/>
      <rect x="240" y="258" width="44" height="42"/>
      <path d="M204 262 h22 v22 h-22 z"/>
      <path d="M298 262 h22 v22 h-22 z"/>
    </g>

    <!-- Checklist lines -->
    <g>
      <rect x="156" y="330" width="16" height="16" rx="3" fill="#10b981"/>
      <path d="M159 338 l4 4 l7 -8" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="182" y="332" width="140" height="12" rx="3" fill="#9ca3af"/>

      <rect x="156" y="358" width="16" height="16" rx="3" fill="#10b981"/>
      <path d="M159 366 l4 4 l7 -8" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="182" y="360" width="120" height="12" rx="3" fill="#9ca3af"/>

      <rect x="156" y="386" width="16" height="16" rx="3" fill="#ffffff" stroke="#9ca3af" stroke-width="2"/>
      <rect x="182" y="388" width="160" height="12" rx="3" fill="#d1d5db"/>
    </g>
  </g>

  <!-- Pencil overlay -->
  <g transform="rotate(35 380 380)" filter="url(#shadow)">
    <rect x="220" y="368" width="170" height="26" rx="4" fill="url(#pencil)"/>
    <rect x="220" y="368" width="30" height="26" rx="4" fill="#fde68a"/>
    <rect x="250" y="368" width="4" height="26" fill="#b45309"/>
    <polygon points="390,368 420,381 390,394" fill="#fde68a"/>
    <polygon points="410,375 420,381 410,387" fill="#1f2937"/>
    <rect x="220" y="368" width="30" height="26" rx="4" fill="#f43f5e"/>
  </g>
</svg>