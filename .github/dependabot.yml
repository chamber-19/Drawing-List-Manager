version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule: { interval: "weekly" }
    labels:
      - "dependencies"
      - "github-actions"
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule: { interval: "weekly" }
    labels:
      - "dependencies"
      - "javascript"
    ignore:
      - dependency-name: "@chamber-19/desktop-toolkit"
        # Pinned by hand, paired with cargo dep below.
  - package-ecosystem: "cargo"
    directory: "/frontend/src-tauri"
    schedule: { interval: "weekly" }
    labels:
      - "dependencies"
      - "rust"
    ignore:
      - dependency-name: "desktop-toolkit"
        # Pinned by hand alongside @chamber-19/desktop-toolkit npm bumps.
        # See repo-specific instruction rule #6.
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule: { interval: "weekly" }
    labels:
      - "dependencies"
      - "python"
