# Pre-installs the toolchain Copilot's coding agent needs to work on this repo.
# Job MUST be named `copilot-setup-steps` (singular). Runs before the agent boots.
#
# Critical: this authenticates npm to GitHub Packages so the agent can run a
# real `npm install` when bumping @chamber-19/desktop-toolkit (regenerating
# package-lock.json with correct integrity hashes). Hand-editing the lockfile
# has bitten sibling repos multiple times — this prevents that failure mode.
#
# Firewall note: the agent's runtime sandbox is firewalled and cannot reach
# api.github.com / npm.pkg.github.com to authenticate `@chamber-19` package
# reads. The firewall does NOT apply to this workflow (setup steps run before
# the agent boots), so this job is the *real* verifier for any PR whose
# install path can't be exercised in the sandbox — bumps to the toolkit pin,
# lockfile regenerations, .npmrc tweaks, or backend dependency changes.
# Keep the path triggers below in sync with that intent.
name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - frontend/package.json
      - frontend/package-lock.json
      - frontend/.npmrc
      - backend/requirements.txt
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - frontend/package.json
      - frontend/package-lock.json
      - frontend/.npmrc
      - backend/requirements.txt

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read   # required for GitHub Packages npm registry

    steps:
      - uses: actions/checkout@v6

      # ── Node + GitHub Packages auth ────────────────────────────────────────
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
          registry-url: https://npm.pkg.github.com
          scope: "@chamber-19"

      - name: Install frontend deps (with GH Packages auth)
        working-directory: frontend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      # ── Rust + Tauri ──────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          toolchain: "1.77.2"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install Tauri Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      # ── Python + backend deps ─────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Verify toolchain
        run: |
          node --version
          npm --version
          cargo --version
          rustc --version
          python --version
