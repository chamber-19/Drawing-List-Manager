<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg3" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#0D2137"/>
      <stop offset="100%" stop-color="#060E18"/>
    </radialGradient>
    <linearGradient id="metal1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C8D6E0"/>
      <stop offset="40%" stop-color="#EDF2F6"/>
      <stop offset="70%" stop-color="#A0B4C0"/>
      <stop offset="100%" stop-color="#C8D6E0"/>
    </linearGradient>
    <linearGradient id="metal2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B0C4CE"/>
      <stop offset="40%" stop-color="#D8E8F0"/>
      <stop offset="100%" stop-color="#B0C4CE"/>
    </linearGradient>
    <linearGradient id="arcline" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4884D"/>
      <stop offset="100%" stop-color="#E8B870"/>
    </linearGradient>
    <filter id="glow3" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sh3" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="2" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg3)"/>

  <!-- Circular arc guide lines (blueprint circles) -->
  <g stroke="#1A4A7A" stroke-opacity="0.35" fill="none">
    <circle cx="256" cy="256" r="200" stroke-width="1"/>
    <circle cx="256" cy="256" r="160" stroke-width="1"/>
    <circle cx="256" cy="256" r="120" stroke-width="0.5" stroke-dasharray="4 4"/>
    <circle cx="256" cy="256" r="80" stroke-width="0.5" stroke-dasharray="4 4"/>
  </g>

  <!-- Crosshair lines -->
  <g stroke="#1A4A7A" stroke-opacity="0.35" stroke-width="1">
    <line x1="56" y1="256" x2="456" y2="256"/>
    <line x1="256" y1="56" x2="256" y2="456"/>
    <line x1="114" y1="114" x2="398" y2="398" stroke-dasharray="6 6"/>
    <line x1="398" y1="114" x2="114" y2="398" stroke-dasharray="6 6"/>
  </g>

  <!-- The large compass arc drawn by the compass (amber, glowing) -->
  <g filter="url(#glow3)">
    <path d="M 108 380 A 200 200 0 0 1 380 108" stroke="url(#arcline)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Small arc tick marks -->
  <g stroke="#C4884D" stroke-width="2" fill="none" stroke-opacity="0.7">
    <line x1="104" y1="370" x2="112" y2="390"/>
    <line x1="120" y1="347" x2="130" y2="365"/>
    <line x1="370" y1="104" x2="390" y2="112"/>
    <line x1="347" y1="120" x2="365" y2="130"/>
  </g>

  <!-- COMPASS INSTRUMENT -->
  <!-- Pivot hinge at top-center of compass -->
  <!-- Left leg of compass -->
  <g filter="url(#sh3)">
    <!-- Left leg (goes down-left to a point) -->
    <line x1="256" y1="160" x2="108" y2="380" stroke="url(#metal1)" stroke-width="10" stroke-linecap="round"/>
    <!-- Right leg (goes down-right) -->
    <line x1="256" y1="160" x2="380" y2="108" stroke="url(#metal2)" stroke-width="10" stroke-linecap="round"/>

    <!-- Hinge mechanism at top -->
    <circle cx="256" cy="160" r="18" fill="#D0DDE8" stroke="#A0B4BE" stroke-width="3"/>
    <circle cx="256" cy="160" r="8" fill="#8A9EAA" stroke="#6A7E8A" stroke-width="2"/>
    <circle cx="256" cy="160" r="3" fill="#3A4A54"/>

    <!-- Left leg detail -->
    <!-- Threaded needle on left leg (pencil end) -->
    <rect x="96" y="370" width="24" height="12" rx="2" fill="url(#metal1)" transform="rotate(60 108 376)"/>
    <!-- Pencil lead tip on left leg -->
    <polygon points="95,382 115,378 105,392" fill="#E8B870" transform="rotate(60 105 385)"/>
    <polygon points="112,378 118,376 112,386" fill="#2A2A2A" transform="rotate(60 115 381)"/>

    <!-- Right leg detail — needle end -->
    <rect x="373" y="97" width="24" height="12" rx="2" fill="url(#metal2)" transform="rotate(-30 385 103)"/>
    <!-- Needle point on right leg -->
    <line x1="386" y1="100" x2="390" y2="96" stroke="#6A7E8A" stroke-width="3" stroke-linecap="round"/>

    <!-- Compass body label -->
    <text x="232" y="148" fill="#C4884D" font-family="monospace" font-size="10" font-weight="700" letter-spacing="0.1em">DLM</text>
  </g>

  <!-- Dimension annotation (typical blueprint style) -->
  <g stroke="#4A8BC4" stroke-width="1.2" fill="none">
    <line x1="156" y1="460" x2="356" y2="460"/>
    <line x1="156" y1="454" x2="156" y2="466"/>
    <line x1="356" y1="454" x2="356" y2="466"/>
    <!-- Dimension arrowheads -->
    <polygon points="156,460 170,456 170,464" fill="#4A8BC4"/>
    <polygon points="356,460 342,456 342,464" fill="#4A8BC4"/>
    <rect x="218" y="452" width="76" height="16" rx="3" fill="#0D2137"/>
    <text x="256" y="464" text-anchor="middle" fill="#4A8BC4" font-family="monospace" font-size="10" font-weight="700">R = 200</text>
  </g>

  <!-- Small "center mark" at compass hinge -->
  <g stroke="#C4884D" stroke-width="1.5" stroke-opacity="0.8">
    <line x1="246" y1="160" x2="266" y2="160"/>
    <line x1="256" y1="150" x2="256" y2="170"/>
  </g>
</svg>
