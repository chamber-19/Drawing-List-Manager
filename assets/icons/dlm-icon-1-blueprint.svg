<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C2B3A"/>
      <stop offset="100%" stop-color="#0F1B26"/>
    </linearGradient>
    <linearGradient id="sheet1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EEF2F7"/>
      <stop offset="100%" stop-color="#D8E2ED"/>
    </linearGradient>
    <filter id="dropshadow1" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="8" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- App icon background -->
  <rect width="512" height="512" rx="108" fill="url(#bg1)"/>

  <!-- Subtle grid overlay on background -->
  <g stroke="#4A6FA5" stroke-opacity="0.12" stroke-width="1">
    <line x1="0" y1="64" x2="512" y2="64"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="192" x2="512" y2="192"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="0" y1="448" x2="512" y2="448"/>
    <line x1="64" y1="0" x2="64" y2="512"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="192" y1="0" x2="192" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="448" y1="0" x2="448" y2="512"/>
  </g>

  <!-- Drawing sheet (main paper) -->
  <g filter="url(#dropshadow1)">
    <rect x="80" y="76" width="352" height="360" rx="8" fill="url(#sheet1)"/>

    <!-- Title block dividers -->
    <line x1="80" y1="370" x2="432" y2="370" stroke="#2D4A6B" stroke-width="2"/>
    <line x1="80" y1="400" x2="432" y2="400" stroke="#2D4A6B" stroke-width="1.5"/>
    <line x1="290" y1="370" x2="290" y2="436" stroke="#2D4A6B" stroke-width="1.5"/>
    <line x1="360" y1="370" x2="360" y2="436" stroke="#2D4A6B" stroke-width="1.5"/>

    <!-- Blueprint floor-plan drawing -->
    <g stroke="#2D5FA8" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <!-- Outer walls -->
      <rect x="110" y="106" width="292" height="240" rx="2"/>
      <!-- Interior partition 1 -->
      <line x1="250" y1="106" x2="250" y2="230"/>
      <!-- Interior partition 2 -->
      <line x1="110" y1="220" x2="250" y2="220"/>
      <!-- Door arc room 1 -->
      <path d="M130 220 A20 20 0 0 0 150 200" stroke-dasharray="none"/>
      <line x1="130" y1="220" x2="130" y2="200"/>
      <!-- Window indication room 2 -->
      <line x1="250" y1="150" x2="402" y2="150"/>
      <line x1="310" y1="106" x2="310" y2="106"/>
      <!-- Window ticks -->
      <line x1="300" y1="106" x2="300" y2="116"/>
      <line x1="330" y1="106" x2="330" y2="116"/>
      <line x1="360" y1="106" x2="360" y2="116"/>
      <!-- Staircase symbol -->
      <line x1="270" y1="230" x2="270" y2="346"/>
      <line x1="270" y1="250" x2="310" y2="250"/>
      <line x1="270" y1="270" x2="310" y2="270"/>
      <line x1="270" y1="290" x2="310" y2="290"/>
      <line x1="270" y1="310" x2="310" y2="310"/>
      <line x1="270" y1="330" x2="310" y2="330"/>
      <rect x="270" y="230" width="40" height="116" stroke-width="2.5"/>
    </g>

    <!-- North arrow -->
    <g transform="translate(390,130)">
      <circle cx="0" cy="0" r="18" fill="none" stroke="#2D5FA8" stroke-width="2"/>
      <polygon points="0,-14 5,4 0,0 -5,4" fill="#2D5FA8"/>
      <polygon points="0,-14 5,4 0,0 -5,4" fill="#8AACDB" transform="rotate(180)"/>
      <text x="0" y="-20" text-anchor="middle" fill="#2D5FA8" font-family="monospace" font-size="11" font-weight="700">N</text>
    </g>

    <!-- Title block text -->
    <text x="100" y="390" fill="#2D4A6B" font-family="monospace" font-size="9" font-weight="700" letter-spacing="0.05em">PROJECT</text>
    <text x="100" y="404" fill="#4A6FA5" font-family="monospace" font-size="8">R3P-25074</text>
    <text x="100" y="417" fill="#2D4A6B" font-family="monospace" font-size="8" letter-spacing="0.05em">DRAWING NO.</text>
    <text x="100" y="428" fill="#4A6FA5" font-family="monospace" font-size="8">A-100-001</text>

    <text x="300" y="390" fill="#2D4A6B" font-family="monospace" font-size="9" font-weight="700" letter-spacing="0.05em">REV</text>
    <text x="300" y="404" fill="#4A6FA5" font-family="monospace" font-size="10" font-weight="700">A</text>

    <text x="370" y="390" fill="#2D4A6B" font-family="monospace" font-size="9" font-weight="700" letter-spacing="0.05em">DATE</text>
    <text x="370" y="404" fill="#4A6FA5" font-family="monospace" font-size="8">2026-04</text>

    <!-- Scale line -->
    <text x="96" y="359" fill="#4A6FA5" font-family="monospace" font-size="8">SCALE 1:100</text>
    <line x1="96" y1="363" x2="176" y2="363" stroke="#4A6FA5" stroke-width="1.5"/>
    <line x1="96" y1="360" x2="96" y2="366" stroke="#4A6FA5" stroke-width="1.5"/>
    <line x1="136" y1="360" x2="136" y2="366" stroke="#4A6FA5" stroke-width="1.5"/>
    <line x1="176" y1="360" x2="176" y2="366" stroke="#4A6FA5" stroke-width="1.5"/>
  </g>

  <!-- Amber DLM badge bottom-right -->
  <rect x="354" y="400" width="90" height="44" rx="8" fill="#C4884D"/>
  <text x="399" y="418" text-anchor="middle" fill="#1C1B19" font-family="monospace" font-size="10" font-weight="700" letter-spacing="0.08em">DRAWING</text>
  <text x="399" y="432" text-anchor="middle" fill="#1C1B19" font-family="monospace" font-size="10" font-weight="700" letter-spacing="0.08em">LIST MGR</text>
</svg>
