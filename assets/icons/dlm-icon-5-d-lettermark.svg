<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1C2B3A"/>
      <stop offset="100%" stop-color="#0C1620"/>
    </linearGradient>
    <linearGradient id="dFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A3A5C"/>
      <stop offset="100%" stop-color="#0E2236"/>
    </linearGradient>
    <linearGradient id="compassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8D090"/>
      <stop offset="60%" stop-color="#C4884D"/>
      <stop offset="100%" stop-color="#A06030"/>
    </linearGradient>
    <linearGradient id="rulerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D8E4F0"/>
      <stop offset="50%" stop-color="#EDF4FF"/>
      <stop offset="100%" stop-color="#C0D0E0"/>
    </linearGradient>
    <filter id="glow5" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="sh5" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip path matching the letter D outline -->
    <clipPath id="dClip">
      <path d="M130 80 L130 432 L240 432 Q390 432 390 256 Q390 80 240 80 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg5)"/>

  <!-- Blueprint grid INSIDE the D (clipped) -->
  <g clip-path="url(#dClip)">
    <g stroke="#2A5A8A" stroke-opacity="0.25" stroke-width="1">
      <!-- Horizontal grid -->
      <line x1="100" y1="104" x2="420" y2="104"/>
      <line x1="100" y1="128" x2="420" y2="128"/>
      <line x1="100" y1="152" x2="420" y2="152"/>
      <line x1="100" y1="176" x2="420" y2="176"/>
      <line x1="100" y1="200" x2="420" y2="200"/>
      <line x1="100" y1="224" x2="420" y2="224"/>
      <line x1="100" y1="248" x2="420" y2="248"/>
      <line x1="100" y1="272" x2="420" y2="272"/>
      <line x1="100" y1="296" x2="420" y2="296"/>
      <line x1="100" y1="320" x2="420" y2="320"/>
      <line x1="100" y1="344" x2="420" y2="344"/>
      <line x1="100" y1="368" x2="420" y2="368"/>
      <line x1="100" y1="392" x2="420" y2="392"/>
      <line x1="100" y1="416" x2="420" y2="416"/>
      <!-- Vertical grid -->
      <line x1="130" y1="60" x2="130" y2="460"/>
      <line x1="154" y1="60" x2="154" y2="460"/>
      <line x1="178" y1="60" x2="178" y2="460"/>
      <line x1="202" y1="60" x2="202" y2="460"/>
      <line x1="226" y1="60" x2="226" y2="460"/>
      <line x1="250" y1="60" x2="250" y2="460"/>
      <line x1="274" y1="60" x2="274" y2="460"/>
      <line x1="298" y1="60" x2="298" y2="460"/>
      <line x1="322" y1="60" x2="322" y2="460"/>
      <line x1="346" y1="60" x2="346" y2="460"/>
      <line x1="370" y1="60" x2="370" y2="460"/>
      <line x1="394" y1="60" x2="394" y2="460"/>
    </g>
    <!-- Fill the D interior -->
    <path d="M130 80 L130 432 L240 432 Q390 432 390 256 Q390 80 240 80 Z" fill="url(#dFill)"/>
  </g>

  <!-- The letter D — stroke outline (the main shape) -->
  <g filter="url(#sh5)">
    <!-- D shape: vertical stroke + curved bowl -->
    <!-- Outer D path -->
    <path d="M130 80 L130 432 L240 432 Q406 432 406 256 Q406 80 240 80 Z"
          fill="none" stroke="#3A6A9A" stroke-width="3"/>
    <!-- Inner D cutout (counter) -->
    <path d="M182 128 L182 384 L238 384 Q350 384 350 256 Q350 128 238 128 Z"
          fill="url(#bg5)" stroke="none"/>
    <!-- Re-fill the ring between inner and outer -->
    <path d="M130 80 L130 432 L240 432 Q406 432 406 256 Q406 80 240 80 Z
             M182 128 L182 384 L238 384 Q350 384 350 256 Q350 128 238 128 Z"
          fill="#1E3A5C" fill-rule="evenodd" stroke="#4A7AB0" stroke-width="2.5"/>
  </g>

  <!-- Compass arc overlaying the D's curve — the COMPASS DRAWS THE D -->
  <g filter="url(#glow5)">
    <!-- Compass arc follows the outer curve of the D -->
    <path d="M 240 80 Q 406 80 406 256 Q 406 432 240 432"
          stroke="url(#compassGrad)" stroke-width="6" fill="none"
          stroke-linecap="round"/>
    <!-- Compass "drawn arc" glow -->
    <path d="M 240 80 Q 406 80 406 256 Q 406 432 240 432"
          stroke="#E8B060" stroke-width="2" fill="none"
          stroke-linecap="round" stroke-opacity="0.5"/>
  </g>

  <!-- RULER along the vertical stroke of the D -->
  <g filter="url(#sh5)">
    <rect x="116" y="72" width="32" height="366" rx="4" fill="url(#rulerGrad)" stroke="#A0B4C8" stroke-width="1.5"/>
    <!-- Ruler tick marks -->
    <g stroke="#4A6A88" stroke-width="1.5">
      <line x1="116" y1="104" x2="136" y2="104"/>
      <line x1="116" y1="128" x2="132" y2="128"/>
      <line x1="116" y1="152" x2="136" y2="152"/>
      <line x1="116" y1="176" x2="132" y2="176"/>
      <line x1="116" y1="200" x2="136" y2="200"/>
      <line x1="116" y1="224" x2="132" y2="224"/>
      <line x1="116" y1="248" x2="136" y2="248"/>
      <line x1="116" y1="272" x2="132" y2="272"/>
      <line x1="116" y1="296" x2="136" y2="296"/>
      <line x1="116" y1="320" x2="132" y2="320"/>
      <line x1="116" y1="344" x2="136" y2="344"/>
      <line x1="116" y1="368" x2="132" y2="368"/>
      <line x1="116" y1="392" x2="136" y2="392"/>
      <line x1="116" y1="416" x2="136" y2="416"/>
    </g>
    <!-- Ruler edge highlight -->
    <line x1="148" y1="72" x2="148" y2="438" stroke="#E8F0F8" stroke-width="1" stroke-opacity="0.3"/>
  </g>

  <!-- COMPASS INSTRUMENT on the curved side -->
  <g filter="url(#sh5)">
    <!-- Compass pivot at top of arc -->
    <circle cx="340" cy="110" r="10" fill="#D0DDE8" stroke="#8AAABA" stroke-width="2"/>
    <circle cx="340" cy="110" r="4" fill="#5A6A78"/>
    <!-- Two legs spreading down from pivot -->
    <!-- Left leg -->
    <line x1="340" y1="110" x2="240" y2="432" stroke="url(#compassGrad)" stroke-width="7" stroke-linecap="round"/>
    <!-- Right leg -->
    <line x1="340" y1="110" x2="406" y2="256" stroke="#C0D0DA" stroke-width="7" stroke-linecap="round"/>
    <!-- Needle point on right leg -->
    <circle cx="406" cy="256" r="5" fill="#C4884D" stroke="#E8B060" stroke-width="1.5"/>
    <!-- Pencil/marking tip on left leg -->
    <circle cx="240" cy="432" r="5" fill="#C4884D"/>
    <polygon points="236,432 244,432 240,442" fill="#2A2A2A"/>
    <!-- Hinge detail -->
    <circle cx="340" cy="110" r="10" fill="none" stroke="#C4884D" stroke-width="2"/>
  </g>

  <!-- "DLM" monogram badge — bottom right corner -->
  <rect x="350" y="390" width="104" height="68" rx="10" fill="#C4884D"/>
  <text x="402" y="416" text-anchor="middle" fill="#1C1B19" font-family="monospace" font-size="18" font-weight="700" letter-spacing="0.08em">DLM</text>
  <text x="402" y="432" text-anchor="middle" fill="#3A2200" font-family="monospace" font-size="7" letter-spacing="0.06em">DRAWING LIST</text>
  <text x="402" y="444" text-anchor="middle" fill="#3A2200" font-family="monospace" font-size="7" letter-spacing="0.06em">MANAGER</text>
</svg>
