<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#1F1D1A"/>
      <stop offset="100%" stop-color="#121110"/>
    </linearGradient>
    <!-- Three sheet gradients (isometric stack) -->
    <linearGradient id="sheetTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EEF2F7"/>
      <stop offset="100%" stop-color="#D4DCE8"/>
    </linearGradient>
    <linearGradient id="sheetRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B0BEC8"/>
      <stop offset="100%" stop-color="#8A9AAA"/>
    </linearGradient>
    <linearGradient id="sheetLeft" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#C8D2DC"/>
      <stop offset="100%" stop-color="#A0AEBA"/>
    </linearGradient>
    <linearGradient id="accentStripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C4884D"/>
      <stop offset="100%" stop-color="#E8B060"/>
    </linearGradient>
    <filter id="sh4" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg4)"/>

  <!-- Subtle corner detail -->
  <path d="M0 108 Q108 0 108 0 L0 0 Z" fill="#C4884D" fill-opacity="0.06"/>
  <path d="M512 404 Q404 512 512 512 Z" fill="#C4884D" fill-opacity="0.06"/>

  <!-- ========= ISOMETRIC DOCUMENT STACK ========= -->
  <!-- Built with isometric projection: x-axis = (+cos30, +sin30), y-axis = (+cos30, -sin30), z-axis = (0, +1) -->
  <!-- Using manual isometric geometry for 3 stacked sheets -->

  <!-- SHEET 3 (bottom) — offset down -->
  <g filter="url(#sh4)" transform="translate(0, 60)">
    <!-- Top face -->
    <polygon points="256,160 390,237 256,314 122,237" fill="#B8C4D0" stroke="#A0AEBA" stroke-width="1"/>
    <!-- Right face -->
    <polygon points="390,237 390,314 256,391 256,314" fill="url(#sheetLeft)" stroke="#A0AEBA" stroke-width="1"/>
    <!-- Left face -->
    <polygon points="256,314 256,391 122,314 122,237" fill="url(#sheetRight)" stroke="#A0AEBA" stroke-width="1"/>
  </g>

  <!-- SHEET 2 (middle) — offset slightly -->
  <g filter="url(#sh4)" transform="translate(0, 30)">
    <!-- Top face -->
    <polygon points="256,140 390,217 256,294 122,217" fill="#D0DAE6" stroke="#B0BEC8" stroke-width="1"/>
    <!-- Blueprint lines on top face (orthographic grid) -->
    <g stroke="#4A7AB0" stroke-width="1" stroke-opacity="0.4">
      <line x1="222" y1="207" x2="290" y2="207"/>
      <line x1="200" y1="220" x2="312" y2="220"/>
      <line x1="200" y1="233" x2="312" y2="233"/>
      <line x1="200" y1="246" x2="312" y2="246"/>
      <line x1="200" y1="259" x2="312" y2="259"/>
      <line x1="200" y1="272" x2="312" y2="272"/>
    </g>
    <!-- Right face -->
    <polygon points="390,217 390,294 256,371 256,294" fill="url(#sheetLeft)" stroke="#B0BEC8" stroke-width="1"/>
    <!-- Left face -->
    <polygon points="256,294 256,371 122,294 122,217" fill="url(#sheetRight)" stroke="#B0BEC8" stroke-width="1"/>
  </g>

  <!-- SHEET 1 (top — main focus) -->
  <g filter="url(#sh4)">
    <!-- Top face (the main document surface) -->
    <polygon points="256,120 390,197 256,274 122,197" fill="url(#sheetTop)" stroke="#C8D4E0" stroke-width="1.5"/>

    <!-- Blueprint drawing on top face — floor plan lines -->
    <g stroke="#2D5FA8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Outer walls of plan (in isometric projection) -->
      <!-- Rectangle in isometric: 4 points transformed -->
      <!-- Simplified floor plan in isometric space -->
      <polygon points="190,200 230,178 290,211 250,233" stroke-width="2.2"/>
      <!-- Interior wall -->
      <line x1="230" y1="178" x2="230" y2="210"/>
      <line x1="190" y1="215" x2="230" y2="210"/>
      <!-- Door arc (approximated) -->
      <path d="M190 215 Q195 207 200 200" stroke-dasharray="none"/>
      <!-- Window lines on outer wall -->
      <line x1="255" y1="214" x2="265" y2="208"/>
      <line x1="268" y1="219" x2="278" y2="213"/>
      <!-- Stair symbol -->
      <line x1="242" y1="224" x2="252" y2="218"/>
      <line x1="245" y1="228" x2="255" y2="222"/>
      <line x1="248" y1="232" x2="258" y2="226"/>
    </g>

    <!-- Title block line on bottom of top face -->
    <line x1="155" y1="262" x2="357" y2="151" stroke="#2D4A6B" stroke-width="1.5" stroke-opacity="0.6"/>

    <!-- Amber accent fold corner on top-right of top sheet -->
    <polygon points="358,152 390,170 358,170" fill="url(#accentStripe)" opacity="0.85"/>

    <!-- Right face -->
    <polygon points="390,197 390,274 256,351 256,274" fill="url(#sheetLeft)" stroke="#C8D4E0" stroke-width="1.5"/>
    <!-- Horizontal lines on right face (ruled paper effect) -->
    <g stroke="#9AAAB8" stroke-width="0.8" stroke-opacity="0.5">
      <line x1="256" y1="293" x2="390" y2="216"/>
      <line x1="256" y1="312" x2="390" y2="235"/>
      <line x1="256" y1="331" x2="390" y2="254"/>
    </g>

    <!-- Left face -->
    <polygon points="256,274 256,351 122,274 122,197" fill="url(#sheetRight)" stroke="#C8D4E0" stroke-width="1.5"/>
    <!-- Horizontal lines on left face -->
    <g stroke="#7A8A98" stroke-width="0.8" stroke-opacity="0.5">
      <line x1="122" y1="216" x2="256" y2="293"/>
      <line x1="122" y1="235" x2="256" y2="312"/>
      <line x1="122" y1="254" x2="256" y2="331"/>
    </g>
  </g>

  <!-- DLM text label — bottom of icon -->
  <rect x="180" y="398" width="152" height="42" rx="8" fill="#C4884D"/>
  <text x="256" y="416" text-anchor="middle" fill="#1C1B19" font-family="monospace" font-size="10" font-weight="700" letter-spacing="0.1em">DRAWING LIST</text>
  <text x="256" y="430" text-anchor="middle" fill="#1C1B19" font-family="monospace" font-size="10" font-weight="700" letter-spacing="0.1em">MANAGER</text>
</svg>
