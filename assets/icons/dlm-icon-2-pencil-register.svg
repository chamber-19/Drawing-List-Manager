<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#252320"/>
      <stop offset="100%" stop-color="#161512"/>
    </linearGradient>
    <linearGradient id="paper2a" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#F0EDE7"/>
      <stop offset="100%" stop-color="#D6D0C4"/>
    </linearGradient>
    <linearGradient id="paper2b" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#E8E4DC"/>
      <stop offset="100%" stop-color="#C8C0B4"/>
    </linearGradient>
    <linearGradient id="paper2c" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#DDD8CE"/>
      <stop offset="100%" stop-color="#B8B0A4"/>
    </linearGradient>
    <linearGradient id="pencilBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8B84A"/>
      <stop offset="100%" stop-color="#C4884D"/>
    </linearGradient>
    <filter id="sh2" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="3" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg2)"/>

  <!-- Subtle dot grid -->
  <g fill="#C4884D" fill-opacity="0.12">
    <circle cx="64" cy="64" r="2"/><circle cx="128" cy="64" r="2"/><circle cx="192" cy="64" r="2"/>
    <circle cx="256" cy="64" r="2"/><circle cx="320" cy="64" r="2"/><circle cx="384" cy="64" r="2"/>
    <circle cx="448" cy="64" r="2"/>
    <circle cx="64" cy="128" r="2"/><circle cx="128" cy="128" r="2"/><circle cx="192" cy="128" r="2"/>
    <circle cx="256" cy="128" r="2"/><circle cx="320" cy="128" r="2"/><circle cx="384" cy="128" r="2"/>
    <circle cx="448" cy="128" r="2"/>
    <circle cx="64" cy="192" r="2"/><circle cx="128" cy="192" r="2"/><circle cx="192" cy="192" r="2"/>
    <circle cx="256" cy="192" r="2"/><circle cx="320" cy="192" r="2"/><circle cx="384" cy="192" r="2"/>
    <circle cx="448" cy="192" r="2"/>
    <circle cx="64" cy="256" r="2"/><circle cx="128" cy="256" r="2"/><circle cx="192" cy="256" r="2"/>
    <circle cx="256" cy="256" r="2"/><circle cx="320" cy="256" r="2"/><circle cx="384" cy="256" r="2"/>
    <circle cx="448" cy="256" r="2"/>
    <circle cx="64" cy="320" r="2"/><circle cx="128" cy="320" r="2"/><circle cx="192" cy="320" r="2"/>
    <circle cx="256" cy="320" r="2"/><circle cx="320" cy="320" r="2"/><circle cx="384" cy="320" r="2"/>
    <circle cx="448" cy="320" r="2"/>
    <circle cx="64" cy="384" r="2"/><circle cx="128" cy="384" r="2"/><circle cx="192" cy="384" r="2"/>
    <circle cx="256" cy="384" r="2"/><circle cx="320" cy="384" r="2"/><circle cx="384" cy="384" r="2"/>
    <circle cx="448" cy="384" r="2"/>
    <circle cx="64" cy="448" r="2"/><circle cx="128" cy="448" r="2"/><circle cx="192" cy="448" r="2"/>
    <circle cx="256" cy="448" r="2"/><circle cx="320" cy="448" r="2"/><circle cx="384" cy="448" r="2"/>
    <circle cx="448" cy="448" r="2"/>
  </g>

  <!-- Stacked register sheets — back layers -->
  <g filter="url(#sh2)">
    <!-- Sheet 3 (back) -->
    <rect x="110" y="136" width="292" height="320" rx="6" fill="url(#paper2c)" transform="rotate(5 256 296)"/>
    <!-- Sheet 2 -->
    <rect x="110" y="120" width="292" height="320" rx="6" fill="url(#paper2b)" transform="rotate(-3 256 280)"/>
    <!-- Sheet 1 (front) -->
    <rect x="96" y="108" width="292" height="320" rx="6" fill="url(#paper2a)"/>

    <!-- Register ruled lines on front sheet -->
    <g stroke="#8B7355" stroke-opacity="0.45" stroke-width="1.2">
      <line x1="112" y1="150" x2="372" y2="150"/>
      <line x1="112" y1="180" x2="372" y2="180"/>
      <line x1="112" y1="210" x2="372" y2="210"/>
      <line x1="112" y1="240" x2="372" y2="240"/>
      <line x1="112" y1="270" x2="372" y2="270"/>
      <line x1="112" y1="300" x2="372" y2="300"/>
      <line x1="112" y1="330" x2="372" y2="330"/>
      <line x1="112" y1="360" x2="372" y2="360"/>
      <line x1="112" y1="390" x2="372" y2="390"/>
      <!-- Column dividers -->
      <line x1="140" y1="130" x2="140" y2="410"/>
      <line x1="220" y1="130" x2="220" y2="410"/>
      <line x1="320" y1="130" x2="320" y2="410"/>
    </g>

    <!-- Header row on front sheet -->
    <rect x="96" y="108" width="292" height="34" rx="6" fill="#3A3026"/>
    <rect x="96" y="130" width="292" height="12" fill="#3A3026"/>
    <text x="113" y="130" fill="#C4884D" font-family="monospace" font-size="9" font-weight="700" letter-spacing="0.08em">NO.</text>
    <text x="152" y="130" fill="#C4884D" font-family="monospace" font-size="9" font-weight="700" letter-spacing="0.06em">DRAWING TITLE</text>
    <text x="232" y="130" fill="#C4884D" font-family="monospace" font-size="9" font-weight="700" letter-spacing="0.06em">STATUS</text>
    <text x="332" y="130" fill="#C4884D" font-family="monospace" font-size="9" font-weight="700" letter-spacing="0.06em">REV</text>

    <!-- Register data rows -->
    <text x="113" y="168" fill="#4A3C2A" font-family="monospace" font-size="8">A-001</text>
    <text x="152" y="168" fill="#4A3C2A" font-family="monospace" font-size="8">Site Plan</text>
    <circle cx="240" cy="164" r="5" fill="none" stroke="#10b981" stroke-width="2"/>
    <path d="M237 164 l2.5 2.5 l4 -5" stroke="#10b981" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <text x="332" y="168" fill="#4A3C2A" font-family="monospace" font-size="8">IFC-3</text>

    <text x="113" y="198" fill="#4A3C2A" font-family="monospace" font-size="8">A-002</text>
    <text x="152" y="198" fill="#4A3C2A" font-family="monospace" font-size="8">Floor Plan</text>
    <circle cx="240" cy="194" r="5" fill="none" stroke="#10b981" stroke-width="2"/>
    <path d="M237 194 l2.5 2.5 l4 -5" stroke="#10b981" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <text x="332" y="198" fill="#4A3C2A" font-family="monospace" font-size="8">IFC-2</text>

    <text x="113" y="228" fill="#4A3C2A" font-family="monospace" font-size="8">A-003</text>
    <text x="152" y="228" fill="#4A3C2A" font-family="monospace" font-size="8">Elevations</text>
    <circle cx="240" cy="224" r="5" fill="none" stroke="#C4884D" stroke-width="2"/>
    <path d="M235 219 A5 5 0 0 1 240 219" stroke="#C4884D" stroke-width="2" fill="#C4884D"/>
    <text x="332" y="228" fill="#4A3C2A" font-family="monospace" font-size="8">IFA-C</text>

    <text x="113" y="258" fill="#4A3C2A" font-family="monospace" font-size="8">A-004</text>
    <text x="152" y="258" fill="#4A3C2A" font-family="monospace" font-size="8">Sections</text>
    <circle cx="240" cy="254" r="5" fill="none" stroke="#4A8BC4" stroke-width="2"/>
    <line x1="235" y1="254" x2="245" y2="254" stroke="#4A8BC4" stroke-width="2"/>
    <text x="332" y="258" fill="#4A3C2A" font-family="monospace" font-size="8">IFA-A</text>

    <text x="113" y="288" fill="#BFAA8E" font-family="monospace" font-size="8">A-005</text>
    <text x="152" y="288" fill="#BFAA8E" font-family="monospace" font-size="8">Details</text>
    <circle cx="240" cy="284" r="5" fill="none" stroke="#6B6458" stroke-width="2"/>
    <text x="332" y="288" fill="#BFAA8E" font-family="monospace" font-size="8">—</text>
  </g>

  <!-- Pencil on top, diagonal -->
  <g transform="rotate(-35 256 256)" filter="url(#sh2)">
    <!-- Eraser ferrule -->
    <rect x="72" y="246" width="28" height="22" rx="2" fill="#C0C0C8"/>
    <line x1="96" y1="246" x2="96" y2="268" stroke="#A8A8B0" stroke-width="2"/>
    <!-- Eraser pink -->
    <rect x="52" y="246" width="22" height="22" rx="2" fill="#F4A0A0"/>
    <!-- Pencil body -->
    <rect x="96" y="246" width="310" height="22" fill="url(#pencilBody)"/>
    <!-- Wood tip cone -->
    <polygon points="406,246 406,268 436,257" fill="#E8C898"/>
    <!-- Graphite tip -->
    <polygon points="436,252 436,262 446,257" fill="#3A3A3A"/>
    <!-- Pencil label stripe -->
    <rect x="120" y="250" width="180" height="2" fill="#ffffff" fill-opacity="0.25"/>
    <text x="200" y="261" text-anchor="middle" fill="#3A2800" font-family="monospace" font-size="9" font-weight="700">DLM</text>
  </g>
</svg>
